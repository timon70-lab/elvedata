<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elvedata – Sørlandselver</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f2d4a; color: #e2e8f0; }
  header { padding: 18px 20px 10px; text-align: center; }
  header h1 { margin: 0; font-size: 1.3rem; font-weight: 700; }
  header p { margin: 4px 0 0; font-size: 0.8rem; color: #94a3b8; }
  #map { width: 100%; height: 78vh; min-height: 420px; }
  .legend { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; padding: 10px 16px 18px; font-size: 0.72rem; color: #94a3b8; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .river-marker { display: flex; align-items: center; justify-content: center; border-radius: 50%; color: #fff; font-weight: 800; font-size: 0.85rem; border: 2px solid rgba(255,255,255,0.85); box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
  .popup-card { font-family: inherit; min-width: 170px; }
  .popup-card .pc-title { font-weight: 700; font-size: 0.95rem; margin: 0 0 2px; color: #0f2d4a; }
  .popup-card .pc-flow { font-size: 0.78rem; color: #475569; margin: 0 0 8px; }
  .popup-card .pc-score { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .popup-card .pc-score-num { font-size: 1.4rem; font-weight: 800; }
  .popup-card .pc-score-lbl { font-size: 0.72rem; color: #64748b; }
  .popup-card a.pc-link { display: block; text-align: center; background: #0f2d4a; color: #fff; text-decoration: none; padding: 7px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
  .leaflet-popup-content-wrapper { border-radius: 10px; }
</style>
</head>
<body>

<header>
  <h1>🌿 Elvedata</h1>
  <p>Live fiskeforhold for sørlandselver — trykk på en elv for detaljer</p>
</header>

<div id="map"></div>

<div class="legend">
  <span><span class="dot" style="background:#38a169"></span> 70–100 svært godt</span>
  <span><span class="dot" style="background:#3182ce"></span> 50–69 godt</span>
  <span><span class="dot" style="background:#dd6b20"></span> 30–49 middels</span>
  <span><span class="dot" style="background:#e53e3e"></span> 0–29 svakt</span>
  <span><span class="dot" style="background:#718096"></span> data mangler</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const RIVERS = [
  {
    id: 'audna',
    name: 'Audna',
    lat: 58.13, lon: 7.35,
    dashboardUrl: 'https://timon70-lab.github.io/elvedata/audna/',
    flowUrl: 'https://timon70-lab.github.io/elvedata/data/vannforing.json',
    scoreTable: {"0":18,"5":51,"10":52,"15":49,"20":67,"25":70,"30":75,"35":59,"40":56,"45":38,"50":74,"60":58,"75":37,"80":25},
    maxBin: 80
  },
  {
    id: 'lygna',
    name: 'Lygna',
    lat: 58.21, lon: 7.14,
    dashboardUrl: 'https://timon70-lab.github.io/elvedata/lygna/',
    flowUrl: 'https://timon70-lab.github.io/elvedata/data/vannforing_lygna.json',
    scoreTable: {"0":24,"5":44,"10":61,"15":62,"20":57,"25":56,"30":56,"35":45,"40":54,"45":54,"50":46,"55":57,"60":0,"65":74,"70":78},
    maxBin: 70
  }
];

function scoreColor(s) {
  if (s === null) return '#718096';
  if (s >= 70) return '#38a169';
  if (s >= 50) return '#3182ce';
  if (s >= 30) return '#dd6b20';
  return '#e53e3e';
}

function nearestBinScore(table, bin, maxBin) {
  const b = Math.max(0, Math.min(maxBin, bin));
  for (let d = 0; d <= maxBin; d += 5) {
    if (table[String(b - d)] !== undefined) return table[String(b - d)];
    if (table[String(b + d)] !== undefined) return table[String(b + d)];
  }
  return null;
}

const map = L.map('map', { zoomControl: true }).setView([58.16, 7.28], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap-bidragsytere',
  maxZoom: 18
}).addTo(map);

RIVERS.forEach(async (river) => {
  const icon = L.divIcon({
    className: '',
    html: '<div class="river-marker" style="width:44px;height:44px;background:#718096">…</div>',
    iconSize: [44, 44],
    iconAnchor: [22, 22]
  });
  const marker = L.marker([river.lat, river.lon], { icon }).addTo(map);
  marker.bindPopup(
    '<div class="popup-card">' +
      '<p class="pc-title">' + river.name + '</p>' +
      '<p class="pc-flow">Henter vannføring…</p>' +
    '</div>'
  );

  let flowVal = null, score = null;
  try {
    const res = await fetch(river.flowUrl);
    if (res.ok) {
      const json = await res.json();
      const obs = json.data[0].observations.filter(o => o.value !== null);
      if (obs.length) {
        flowVal = obs[obs.length - 1].value;
        const bin = Math.floor(flowVal / 5) * 5;
        score = nearestBinScore(river.scoreTable, bin, river.maxBin);
      }
    }
  } catch (e) { /* marker faller tilbake til grå/ukjent */ }

  const col = scoreColor(score);
  const el = marker.getElement();
  if (el) {
    const inner = el.querySelector('.river-marker');
    inner.style.background = col;
    inner.textContent = score !== null ? score : '–';
  }

  const flowStr = flowVal !== null ? flowVal.toFixed(1) + ' m³/s' : 'ikke tilgjengelig';
  const scoreStr = score !== null ? score : '–';
  marker.setPopupContent(
    '<div class="popup-card">' +
      '<p class="pc-title">' + river.name + '</p>' +
      '<p class="pc-flow">Vannføring: ' + flowStr + '</p>' +
      '<div class="pc-score">' +
        '<span class="pc-score-num" style="color:' + col + '">' + scoreStr + '</span>' +
        '<span class="pc-score-lbl">fiskescore<br>nå</span>' +
      '</div>' +
      '<a class="pc-link" href="' + river.dashboardUrl + '" target="_blank">Åpne dashboard →</a>' +
    '</div>'
  );
});
</script>

</body>
</html>
