name: Foto-pipeline

on:
  push:
    paths:
      - 'bilder/innboks/audna/**'
      - 'bilder/innboks/mandalselva/**'
      - 'bilder/innboks/lygna/**'
      - 'bilder/innboks/otra/**'
      - 'bilder/innboks/sygna/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: foto-pipeline
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install pillow requests

      - name: Kjør foto-pipeline
        env:
          NVE_API_KEY: ${{ secrets.NVE_API_KEY }}
        run: python scripts/foto_pipeline.py

      - name: Commit og push resultat
        run: |
          git config user.name "foto-pipeline"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Foto-pipeline: prosesserte nye bilder [skip ci]"
          git push
