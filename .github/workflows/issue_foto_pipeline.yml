name: Foto-pipeline (via Issue)

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process-issue-photos:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install pillow requests

      - name: Kjør issue-basert foto-pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          NVE_API_KEY: ${{ secrets.NVE_API_KEY }}
        run: python scripts/issue_foto_pipeline.py

      - name: Commit og push komprimerte bilder
        run: |
          git config user.name "issue-foto-pipeline"
          git config user.email "actions@users.noreply.github.com"
          git add bilder data
          git diff --cached --quiet || git commit -m "Foto fra issue #${{ github.event.issue.number }} [skip ci]"
          git push
