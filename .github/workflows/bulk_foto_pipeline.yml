name: Bulk foto-pipeline

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release-tag med zip-vedlegg (undermapper per elv: audna/, lygna/, mandalselva/, otra/, sygna/)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: foto-pipeline
  cancel-in-progress: false

jobs:
  bulk:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install pillow requests

      - name: Last ned release-zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/bulk
          gh release download "${{ inputs.release_tag }}" --pattern '*.zip' --dir /tmp/bulk --repo "${{ github.repository }}"
          ls -la /tmp/bulk

      - name: Pakk ut til innbokser
        run: python scripts/bulk_unpack.py /tmp/bulk

      - name: Kjør foto-pipeline
        env:
          NVE_API_KEY: ${{ secrets.NVE_API_KEY }}
        run: python scripts/foto_pipeline.py

      - name: Oppsummering og opprydding
        run: |
          echo "## Bulk foto-pipeline — ${{ inputs.release_tag }}" >> "$GITHUB_STEP_SUMMARY"
          NYE_MANUELL=""
          for elv in audna lygna mandalselva otra sygna; do
            if [ -f "data/photos_${elv}.json" ] && ! git diff --quiet -- "data/photos_${elv}.json"; then
              # Innrykk (indent=1) gir 2 mellomrom foran "id" - mønsteret er bevisst
              # mellomrom-uavhengig ('^+ *"id":') så det tåler fremtidige formatendringer.
              antall=$(git diff -- "data/photos_${elv}.json" | grep -c '^+ *"id":' || true)
              echo "- **${elv}**: ${antall} nye bilder publisert" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -d "bilder/innboks/${elv}" ] && [ -n "$(ls -A "bilder/innboks/${elv}" 2>/dev/null)" ]; then
              NYE_MANUELL="ja"
            fi
          done
          if [ -d bilder/innboks/manuell ] && [ -n "$(ls -A bilder/innboks/manuell 2>/dev/null)" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ⚠️ Ikke publisert i denne kjøringen (mangler GPS/EXIF, sonetilordning eller bildeprosessering feilet) — se rå logg under «Kjør foto-pipeline» for eksakt årsak per fil, last opp manuelt via foto-issue:" >> "$GITHUB_STEP_SUMMARY"
            ls bilder/innboks/manuell | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Alle bilder med GPS ble publisert. ✓" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$NYE_MANUELL" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Noen elve-innbokser har fortsatt filer liggende (bør være tomme etter en vellykket kjøring) - sjekk rå logg." >> "$GITHUB_STEP_SUMMARY"
          fi
          # Slett KUN de tomme per-elv-arbeidsmappene - bilder/innboks/manuell/
          # (GPS-/sone-/prosesseringsfeil) skal IKKE slettes, slik at feilede
          # bilder overlever i git og kan rettes/lastes opp på nytt manuelt.
          for elv in audna lygna mandalselva otra sygna; do
            rm -rf "bilder/innboks/${elv}"
          done

      - name: Commit og push resultat
        run: |
          git config user.name "bulk-foto-pipeline"
          git config user.email "actions@users.noreply.github.com"
          git add bilder data
          git diff --cached --quiet || git commit -m "Bulk foto-pipeline: ${{ inputs.release_tag }} [skip ci]"
          git push
