name: Oppdater NVE vannføringsdata

on:
  schedule:
    - cron: '0 * * * *'   # Kjører hver time på timen
  workflow_dispatch:        # Kan også kjøres manuelt fra GitHub

jobs:
  hent-nve-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Nødvendig for å pushe JSON-filene

    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Hent data fra NVE HydAPI
        env:
          NVE_API_KEY: ${{ secrets.NVE_API_KEY }}
        run: |
          mkdir -p data
          curl -s \
            -H "X-API-Key: $NVE_API_KEY" \
            "https://hydapi.nve.no/api/v1/Observations?StationId=23.8.0&Parameter=1001&ResolutionTime=60&ReferenceTime=P7D/" \
            -o data/vannforing.json
          curl -s \
            -H "X-API-Key: $NVE_API_KEY" \
            "https://hydapi.nve.no/api/v1/Observations?StationId=24.9.0&Parameter=1001&ResolutionTime=60&ReferenceTime=P7D/" \
            -o data/vannforing_lygna.json
          curl -s \
            -H "X-API-Key: $NVE_API_KEY" \
            "https://hydapi.nve.no/api/v1/Observations?StationId=22.4.0&Parameter=1001&ResolutionTime=60&ReferenceTime=P7D/" \
            -o data/vannforing_mandalselva.json
          python3 -c "
          import json
          for fn, navn in [('data/vannforing.json','Audna/Gaupefossen'), ('data/vannforing_lygna.json','Lygna/Tingvatn'), ('data/vannforing_mandalselva.json','Mandalselva/Kjølemo')]:
              with open(fn) as f:
                  d = json.load(f)
              obs = d['data'][0]['observations']
              print(f'{navn} OK: {len(obs)} observasjoner')
          "

      - name: Hent nedbørsprognose fra MET
        run: |
          curl -s \
            -H "User-Agent: audna-dashboard github.com/timon70-lab/audna" \
            "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.27&lon=7.40" \
            -o data/nedbor.json
          python3 -c "
          import json
          with open('data/nedbor.json') as f:
              d = json.load(f)
          ts = d['properties']['timeseries']
          print(f'MET OK: {len(ts)} tidspunkter')
          "

      - name: Commit og push JSON-filene
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vannforing.json data/vannforing_lygna.json data/vannforing_mandalselva.json data/nedbor.json
          git diff --staged --quiet || git commit -m "Data oppdatert $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
